<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/VBus/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="VBUS — live university bus tracking, seat booking and chat.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="VBUS">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>VBUS — Live Bus Tracking</title>
  <link rel="manifest" href="manifest.json">

  <!--
    Google Maps JavaScript API — required by google_maps_flutter on the web.
    Create a key in Google Cloud with "Maps JavaScript API" enabled, then
    restrict it by HTTP referrer to your hosting domain(s) and replace the
    placeholder below. This key is necessarily visible in page source; the
    referrer restriction is what secures it (do NOT reuse the Android key).
  -->
  <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_MAPS_JS_API_KEY"></script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
